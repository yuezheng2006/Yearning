version: '3.8'

services:
  # MySQL数据库服务
  mysql:
    image: mysql:5.7
    container_name: yearning-mysql-dev
    environment:
      MYSQL_ROOT_PASSWORD: yearning123
      MYSQL_DATABASE: yearning
      MYSQL_USER: yearning
      MYSQL_PASSWORD: yearning123
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
      - --sql-mode=STRICT_TRANS_TABLES,NO_ZERO_DATE,NO_ZERO_IN_DATE,ERROR_FOR_DIVISION_BY_ZERO,NO_AUTO_CREATE_USER,NO_ENGINE_SUBSTITUTION
    ports:
      - "3306:3306"
    volumes:
      - yearning_mysql_dev_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "yearning", "-pyearning123"]
      timeout: 10s
      retries: 10
      interval: 30s
    restart: always
    networks:
      - yearning-dev

  # 后端开发服务 - 用于API调试
  backend-dev:
    build:
      context: .
      dockerfile: Dockerfile.backend-dev
    container_name: yearning-backend-dev
    environment:
      MYSQL_USER: yearning
      MYSQL_PASSWORD: yearning123
      MYSQL_ADDR: mysql
      MYSQL_PORT: "3306"
      MYSQL_DB: yearning
      SECRET_KEY: dev_secret_key_1234567890
      Y_LANG: zh_CN
      GIN_MODE: debug
      LOG_LEVEL: debug
    ports:
      - "8000:8000"  # 后端API端口
      - "2345:2345"  # Go调试端口 (delve)
    volumes:
      - .:/app          # 挂载源码目录
      - /app/Yearning   # 排除编译的二进制文件
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - yearning-dev
    # 开发模式命令
    command: |
      bash -c "
        echo '等待MySQL启动...'
        sleep 10
        echo '初始化数据库...'
        go run . install
        echo '启动开发服务器...'
        dlv debug --headless --listen=:2345 --api-version=2 --accept-multiclient . -- run --port 8000
      "

  # 前端开发服务 (使用官方Yearning-gemini仓库)
  frontend-dev:
    build:
      context: .
      dockerfile: Dockerfile.frontend-dev
    container_name: yearning-frontend-dev
    ports:
      - "5001:5001"  # 前端开发服务器端口
    environment:
      - VUE_APP_API_URL=http://localhost:8000
    networks:
      - yearning-dev
    restart: unless-stopped
    depends_on:
      - backend-dev

  # Nginx代理服务 - 整合前后端
  nginx-proxy:
    image: nginx:alpine
    container_name: yearning-nginx-dev
    ports:
      - "80:80"
    volumes:
      - ./nginx-dev.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend-dev
      - frontend-dev
    networks:
      - yearning-dev
    restart: unless-stopped

volumes:
  yearning_mysql_dev_data:
    driver: local

networks:
  yearning-dev:
    driver: bridge

# 开发环境说明：
# - 前端开发服务器: http://localhost:5000
# - 后端API服务器: http://localhost:8000 (Go调试)
# - 完整应用代理: http://localhost (Nginx整合)
# - MySQL数据库: localhost:3306
# - Go调试端口: localhost:2345

version: '3.8'

services:
  yearning:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: yearning-prod
    environment:
      MYSQL_USER: yearning
      MYSQL_PASSWORD: yourpassword
      MYSQL_ADDR: mysql
      MYSQL_DB: yearning
      SECRET_KEY: your_secret_key_here
      Y_LANG: zh_CN
    ports:
      - "8000:8000"
    depends_on:
      - mysql
    restart: always

  mysql:
    image: mysql:5.7
    container_name: yearning-mysql-prod
    environment:
      MYSQL_ROOT_PASSWORD: yourpassword
      MYSQL_DATABASE: yearning
      MYSQL_USER: yearning
      MYSQL_PASSWORD: yourpassword
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: always

volumes:
  mysql_data:
